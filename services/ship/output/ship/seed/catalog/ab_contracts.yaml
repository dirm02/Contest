schema: ab
name: ab_contracts
description: Alberta contract disclosure records for competed and disclosed public contracts.
grain: one row per Alberta disclosed contract
primary_key: [id]
row_count_estimate: 500000
refresh_cadence: monthly
coverage_period: ["2005-01-01", "2026-12-31"]
safe_for_analytical: true
columns:
  - {name: id, type: string, nullable: false, description: Source contract row identifier, examples: ["12345"]}
  - {name: recipient, type: string, nullable: true, description: Supplier or recipient name, examples: ["ABC Services Ltd."]}
  - {name: ministry, type: string, nullable: true, description: Alberta ministry or public body, examples: ["Health"]}
  - {name: display_fiscal_year, type: string, nullable: true, description: Display fiscal year label, units: fiscal_year, examples: ["2023-2024"]}
  - {name: amount, type: decimal, nullable: true, description: Contract amount in Canadian dollars, units: CAD, examples: ["250000.00"]}
join_keys: {}
