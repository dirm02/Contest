    sql_template: "(({col} ILIKE '%school%' OR {col} ILIKE '%école%' OR {col} ILIKE '%conseil scolaire%' OR {col} ILIKE '%commission scolaire%') AND NOT ({col} ILIKE '%school of medicine%' OR {col} ILIKE '%school of business%' OR {col} ILIKE '%law school%'))"
caveats:
