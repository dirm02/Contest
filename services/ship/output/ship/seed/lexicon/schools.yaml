concept: schools
synonyms: [school, schools, elementary school, high school, school district, school board, conseil scolaire, commission scolaire, école, écoles]
description: K-12 schools and school authorities.
applicable_columns:
  - {table: fed.grants_contributions, column: recipient_legal_name, match: name_pattern}
  - {table: ab.ab_contracts, column: recipient, match: name_pattern}
  - {table: ab.ab_sole_source, column: vendor, match: name_pattern}
  - {table: ab.ab_grants, column: recipient, match: name_pattern}
  - {table: cra.govt_funding_by_charity, column: legal_name, match: name_pattern}
predicate:
