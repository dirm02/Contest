# AccountabilityMax — nginx site (HTTP first; certbot will add SSL blocks).
# Copy to: /etc/nginx/sites-available/accountibilitymax
# Enable:    sudo ln -sf /etc/nginx/sites-available/accountibilitymax /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your real hostname (e.g. lev3l.website).
# Static root must match where you extracted `npm run build` output (dist/).

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    root /var/www/accountibilitymax/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Dossier API (Express on the hackathon general server, default 3801)
    location /api/ {
        proxy_pass http://127.0.0.1:3801;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
